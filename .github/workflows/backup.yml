name: Respaldo Automático de Base de Datos

on:
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón en GitHub o vía API

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Instalar cliente de PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Realizar backup (pg_dump)
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          pg_dump -h ${{ secrets.DB_HOST }} -p ${{ secrets.DB_PORT }} -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -F p > backup.sql

      - name: Generar nombre de archivo con fecha
        id: filename
        run: echo "filename=backup_$(date +'%Y-%m-%d_%H-%M-%S').sql" >> $GITHUB_OUTPUT

      - name: Subir a Supabase Storage (Bucket backups)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/storage/v1/object/backups/${{ steps.filename.outputs.filename }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
          -H "Content-Type: application/sql" \
          --data-binary @backup.sql